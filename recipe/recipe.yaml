schema_version: 1

context:
  name: squashfs-tools
  version: "4.7.5"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://github.com/plougher/squashfs-tools/archive/refs/tags/${{ version }}.tar.gz
  sha256: 547b7b7f4d2e44bf91b6fc554664850c69563701deab9fd9cd7e21f694c88ea6
  patches:
    - 0001-Compatability-define-for-macOS.patch

build:
  number: 0
  skip: not unix

requirements:
  build:
    - ${{ compiler('c') }}
    - ${{ stdlib("c") }}
    - make
    - help2man
    - sed
  host:
    - lz4-c
    - lzo
    - liblzma-devel
    - zlib
    - zstd

tests:
  - script:
      - mkdir testdir
      - touch testdir/testfile
      - mksquashfs testdir recipe.fs
      - unsquashfs recipe.fs

about:
  license: GPL-2.0-or-later
  license_file: COPYING
  summary: Tools for creating and unpacking squashfs filesystems
  description: |
    Squashfs is a highly compressed read-only filesystem for Linux.
    It uses either gzip/xz/lzo/lz4 compression to compress both files, inodes
    and directories.  Inodes in the system are very small and all blocks are
    packed to minimise data overhead. Block sizes greater than 4K are supported
    up to a maximum of 1Mbytes (default block size 128K).


  homepage: https://sourceforge.net/projects/squashfs/

extra:
  recipe-maintainers:
    - sodre
    - mingwandroid
    - xhochy
